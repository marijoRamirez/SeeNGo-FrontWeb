<div class="page-dashboard">
  @if (!sidebarCollapsed) {
    <div class="sidebar-backdrop" (click)="sidebarCollapsed = true"></div>
  }
  <main class="main">
    <app-sidebar [links]="links" [(collapsed)]="sidebarCollapsed" />
    <div class="dashboard-content" [class.expanded]="sidebarCollapsed">
      <router-outlet />
    </div>
  </main>
</div>
