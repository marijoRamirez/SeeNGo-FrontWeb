<div class="profile-container">
  <h1>Mi Perfil</h1>

  <div class="profile-card">
    <div class="profile-image">
      <img src="assets/profile-picture.jpg" alt="Foto de perfil">
    </div>
    <div class="profile-details">
      <p><strong>Nombre:</strong> {{ name }}</p>
      <p><strong>Email:</strong> {{ email }}</p>
      <p><strong>Teléfono:</strong> {{ phone || 'No registrado' }}</p>
    </div>

    <div class="profile-actions">
      <button class="edit-button">Editar Perfil</button>
      <button class="logout-button" (click)="auth.logout()">Cerrar Sesión</button>
      <button class="delete-button">Eliminar Cuenta</button>
    </div>
  </div>
</div>
